<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Shop Agendamentos</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(233, 223, 199, 0.95), rgba(248, 250, 252, 1) 48%),
          #f8fafc;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .card {
        width: 360px;
        padding: 32px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(16, 32, 39, 0.12);
        text-align: center;
      }

      .icon {
        width: 92px;
        height: 92px;
        margin: 0 auto 20px;
        display: block;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
        color: #102027;
      }

      p {
        margin: 12px 0 0;
        font-size: 15px;
        line-height: 1.5;
        color: #475569;
      }

      .loader {
        width: 44px;
        height: 44px;
        margin: 24px auto 0;
        border-radius: 999px;
        border: 4px solid rgba(15, 118, 110, 0.2);
        border-top-color: #0f766e;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="icon" src="../assets/app-icon.svg" alt="Pet Shop Agendamentos" />
      <h1>Pet Shop Agendamentos</h1>
      <p>Carregando o painel operacional e sincronizando as agendas do Google Calendar.</p>
      <div class="loader" aria-hidden="true"></div>
    </div>
  </body>
  </html>
